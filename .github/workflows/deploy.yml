name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Triggers the build anytime code updates on main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download code out of the GitHub Repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up the Docker Buildx tool for enhanced caching features
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 3: Securely authenticate into Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 4: Automate the Docker Build and Push task
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${{ github.sha }}
